[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "its"
version = "0.1.0"
description = "ITS — Integrated Technical System execution layer for Evergreen Renewables."
requires-python = ">=3.12"
dependencies = [
    "anthropic>=0.40.0",
    "smartsheet-python-sdk>=3.0.0",
    "boxsdk[jwt]>=3.10.0",
    "msal>=1.28.0",
    "requests>=2.32.0",
    "python-docx>=1.1.0",
    "python-dateutil>=2.9.0",
    "holidays>=0.50",
    "sentry-sdk>=2.0,<3.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-mock>=3.12",
    "pytest-cov>=5.0",
    "ruff>=0.5.0",
    "mypy>=1.10",
]

[tool.setuptools]
# Python packages that ship with the project.
# Asset directories (schemas, prompts, scripts, logs) are NOT Python packages.
packages = ["shared", "safety_reports"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"smartsheet_migration/*" = ["E401", "I001", "F401", "B007", "UP035"]
"box_migration/*"        = ["I001", "F401", "UP042", "UP045"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q --strict-markers"
