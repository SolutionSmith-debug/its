name: ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy, blocking)
        run: mypy .

      - name: Tests (pytest + coverage)
        run: pytest --cov=shared --cov=safety_reports --cov-report=term-missing -q
