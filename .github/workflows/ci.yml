name: ci

on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded in-flight runs for the same ref (overlapping pushes to a
# branch). main-branch CI on merge commits is unaffected — distinct refs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy, blocking)
        run: mypy .

      - name: Tests (pytest + coverage)
        run: pytest --cov=shared --cov=safety_reports --cov-report=term-missing -q

      # Warn-only during the retrofit window (see docs/operations/doc_conventions.md
      # "Retrofit policy"). Both invocations are designed to exit 0 even with
      # violations; output appears in the CI log so the operator can see drift.
      - name: Doc-conventions lint (warn-only)
        run: python -m scripts.lint_doc_conventions

      - name: Doc-index freshness (warn-only)
        run: python -m scripts.regen_doc_indexes --check || echo "::warning::Doc indexes stale — run \`python -m scripts.regen_doc_indexes\` locally."

      # Warn-only, like the doc linters above. check_doctrine_drift is the
      # propose-only MECHANICAL tier of the cross-repo drift guard: it prints
      # findings and exits 0 even when drift exists (the operator + the heavy
      # semantic tier — the doc-reconciliation-auditor agent — decide). It exits
      # non-zero ONLY on a fatal config error (e.g. an unreadable doctrine
      # manifest), which SHOULD fail CI. Previously this ran only via unit tests
      # + the on-demand agent; now every CI run surfaces mechanical drift.
      - name: Doctrine-drift check (warn-only, mechanical tier)
        run: python -m scripts.check_doctrine_drift

  # Safety Portal (Cloudflare Worker + React SPA) — TypeScript typecheck + Worker
  # tests. BLOCKING, like `test`. The Python `test` job does NOT cover safety_portal/
  # TS at all, so without this job the auth/role/impersonation code in the Worker
  # would merge with zero automated coverage. Worker tests run in workerd via
  # @cloudflare/vitest-pool-workers against a real Miniflare D1 (not mocks).
  portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: safety_portal
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        # v6 is the current stable line (latest v6.4.0) and matches the repo's
        # actions/checkout@v6 + setup-python@v6 pins. §41 review: v6's only breaking
        # change vs v4 is that automatic caching is limited to npm — which is exactly
        # this job's explicit `cache: npm`, so it is a no-op for us. (v5 bumped the
        # action runtime to node24; GitHub-hosted ubuntu runners are well past the
        # required runner version.)
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: safety_portal/package-lock.json

      - name: Install (npm ci)
        run: npm ci

      - name: Typecheck (tsc — SPA + Worker)
        run: npm run typecheck

      - name: Worker tests (vitest-pool-workers — real workerd + D1)
        run: npm test

      - name: SPA render-smoke (vitest + jsdom — third renderer, brief C5)
        # Renders every ACTIVE catalog form through the SPA <FormRenderer/> and asserts
        # NON-DEGRADED DOM — the third leg of the render-smoke net (the two Python
        # renderers are covered by tests/test_render_smoke.py in the `test` job). Runs
        # in jsdom (a separate vitest config from the workerd worker pool above).
        run: npm run test:spa

  # Secret-scanning gate. BLOCKING (unlike the propose-only doc/drift steps) —
  # a committed secret must stop the merge. Separate job so it runs in parallel
  # with `test` and surfaces as its own PR check. Uses the pinned gitleaks
  # BINARY rather than gitleaks/gitleaks-action@v2 because that action requires
  # a paid GITLEAKS_LICENSE for GitHub Organizations (SolutionSmith-debug is an
  # org). Pin GITLEAKS_VERSION on bumps after reading the release notes.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full commit history for the `gitleaks git` scan

      - name: Install gitleaks (pinned)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan full git history for secrets (blocking)
        run: gitleaks git . --redact --no-banner --exit-code 1
