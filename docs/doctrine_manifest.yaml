# --- Model strings — VERIFY-REQUIRED, NOT asserted-current ---------------------
# Model currency is a LIVE fact that changes on Anthropic's release cadence. The
# agent FLAGS these for verification against current Anthropic docs and NEVER
# auto-blesses or asserts they are current. The values below are what the repo
# CURRENTLY ASSERTS in CLAUDE.md, recorded only so the checker can detect that
# code and CLAUDE.md agree with each other — agreement is NOT a currency claim.
models:
  verify_required: true
  asserted_in: "CLAUDE.md (Model selection section)"
  policy: "agent flags for human verification against current Anthropic model docs; never auto-updates"
  reasoning_default: claude-sonnet-4-6
  high_volume_classification: claude-haiku-4-5-20251001
  deep_reasoning: claude-opus-4-7

