# ITS canonical-doctrine manifest
# =================================
# Machine-readable source of truth for the `doc-reconciliation-auditor` agent
# (.claude/agents/doc-reconciliation-auditor.md) and the deterministic checker
# `scripts/check_doctrine_drift.py`. Every checkable canonical fact lives here so
# the mechanical drift tier is reproducible and CI-safe.
#
# HOME DECISION (why this lives in ~/its, not ~/its-blueprint)
# ------------------------------------------------------------
# This manifest is EXECUTION-REPO-RESIDENT but BLUEPRINT-DERIVED. The blueprint
# (`../its-blueprint`) is the upstream canonical source — every fact below carries
# a `source` pointer at the blueprint doctrine or an in-repo file — but the manifest
# itself is committed here because:
#   - The mechanical checker + its test run in CI, and CI checks out ONLY ~/its
#     (the blueprint repo is NOT present in the GitHub Actions runner). A manifest
#     read from `../its-blueprint` at CI time would fail. The facts the checker
#     compares against must be self-contained in this repo.
#   - This mirrors how `shared/sheet_ids.py` holds canonical Smartsheet IDs in-repo
#     with provenance comments rather than reading them live.
#   - It is meta-consistent: a stale manifest-vs-blueprint IS the drift class the
#     agent exists to detect, so the manifest residing where the agent watches it
#     is correct. "Blueprint-canonical + sync" resolves to exactly this: the
#     blueprint doctrine frontmatter is upstream; this file is the synced-into-~/its
#     derivation, with per-fact `source` + `blueprint_verified_against` provenance.
#
# TWO CHECK MODES
# ---------------
#   - CI mode (blueprint absent): checker compares ~/its code/docs against the
#     values in THIS file only.
#   - Local mode (operator/agent, blueprint present as sibling dir): checker may
#     ALSO cross-check these values against live blueprint frontmatter, surfacing
#     a stale manifest itself.
#
# UPDATE DISCIPLINE: when blueprint doctrine bumps, update the matching value here
# and refresh `blueprint_head` + the fact's `blueprint_verified_against`. This is a
# propose-only-agent INPUT, never auto-written by the agent.

meta:
  manifest_version: 1
  generated: "2026-06-07"
  its_head: 44370e1              # ~/its origin/main this manifest was validated against (2026-06-12 photo/download/Form-Request program, PRs #271–#276 + #279/#280/#281; refreshed from f3ad814 at the blueprint mission-v5 sync). Exec code unchanged by the 2026-06-17 B5 blueprint doctrine cascade (blueprint-only) — Op Stds v18 / FM v11 / Handover v9 / V&R v9 / Excellence v5.
  blueprint_head: ad8f563        # ~/its-blueprint main this manifest is synced against (refreshed on doctrine bump, per UPDATE DISCIPLINE above); ad8f563 = 2026-06-17 B5 doctrine cascade — Excellence Roadmap v5 (Track 3.4 platform fork-source / portal-template), tag excellence-roadmap-v5; other doctrine unchanged (Op Stds v18 / Handover v9 / FM v11 / V&R v9)
  seeded_by: "doc-reconciliation series PR 2 (manifest)"

# --- Doctrine versions (the headline drift class) ------------------------------
doctrine_versions:
  operational_standards:
    current: 18
    # Highest existing §-section. Numbering is append-only since v11; v18 added
    # §§45-49, so §1..§49 all resolve. The M7 citation-resolver flags any
    # `Op Stds §N` in current-doctrine prose with N > max_section (a citation that
    # resolves to no section — a typo or a forward-ref to unbuilt doctrine). Bump
    # this the same PR a new §-section lands in canonical doctrine.
    max_section: 49
    source: "../its-blueprint/doctrine/operational-standards.md"
    source_field: "frontmatter.version"
    blueprint_verified_against: 0e85a1a   # 2026-06-07 deploy reconciliation (Op Stds v18); prior: 8c708b9 (v16)
    notes: >
      v12 added §§37-41; v13 added §42 (code-level self-documentation discipline);
      v14 reframed the kill switch as an operator-convenience pause that is fail-open
      by design and NOT a security control (§1, audit F07) — companion to FM v9's
      Invariant 2 Layer 5 tripwire reframe (audit F13); §42 unchanged in v14.
      v15 added §43 (Successor-Remediation Documentation Discipline — the plain-language
      "document-as-you-build" successor runbook companion to §42) + §44 (Tier-2
      Claude-assisted repair path) and applied the Developer-Operator / Successor-Operator
      role split across §§37-44. v16 recharacterized §44's Tier-2 boundary from a structural
      "non-developer-safe enforcement layer" (which v15 named as a hard pre-cutover BUILD GAP)
      to training-bounded co-resolution: there is no structural maintenance enforcement layer
      and none is built or required; the boundary holds by the trained operator's judgment,
      the both-rule (novel OR high-class → Tier 3), and co-resolution with the Developer-Operator
      until per-category clearance. v17 (2026-06-05) added the sixth standalone workspace
      (ITS — Safety Portal) to §23/§24 — governing principle workspace-membership = approval
      authority. v18 (2026-06-07) added §§45-49: find-or-create-not-strand; workspace-membership
      = approval authority (in-code F22 mechanism); Box version-on-conflict; CodeQL-FP handling;
      preservation-for-a-committed-future-workstream. Section numbering is append-only since v11
      — no cited section renumbered (§§1-44 carry forward). Citations in ~/its should read
      "Op Stds v18" / "Operational Standards v18".
    drift_signal: 'Op Stds v(1[0-7]|[0-9])\b or Operational Standards v(1[0-7]|[0-9])\b in current-doctrine prose'
  foundation_mission:
    current: 11
    source: "../its-blueprint/doctrine/foundation-mission.md"
    source_field: "frontmatter.version"
    blueprint_verified_against: 0e85a1a   # re-verified unchanged at v11, 2026-06-07; prior: 8c708b9 (FM v11)
    notes: >
      FM v8 added Invariant 2 Layer 6 (attachment screening); v9 reframed Invariant 2
      Layer 5 (anomaly logging on extraction output) from a defense layer to a detection
      tripwire (audit F13) — mechanism unchanged, characterization corrected.
      v10 composed Invariant 1's two-process capability-gating philosophy into a
      maintenance through-line and introduced the Developer-Operator / Successor-Operator
      two-named-role principle (naming a "non-developer-safe enforcement layer" as a
      pre-cutover build requirement). v11 removes that enforcement-layer framing — there is
      no structural maintenance enforcement layer and none is built or required; the
      through-line ends at philosophy, not a built control. The two-named-role principle
      stays (Successor-Operator redefined as a trained operator who runs Claude Code himself);
      the Tier-2 maintenance boundary is enforced by training + the both-rule + co-resolution
      with the Developer-Operator. Invariant principles, the six-layer structure, and v9's
      Layer 5 tripwire framing all carry forward verbatim. Citations in ~/its should read
      "Foundation Mission v11" / "FM v11".
    drift_signal: 'Foundation Mission v([0-9]|10)\b or FM v([0-9]|10)\b in current-doctrine prose'
  handover_plan:
    current: 9
    source: "../its-blueprint/doctrine/handover-plan.md"
    source_field: "frontmatter.version"
    blueprint_verified_against: 0e85a1a   # 2026-06-07 deploy reconciliation (Handover v9); prior: 8c708b9 (v8)
    notes: >
      v8 removed the Tier-2 "non-developer-safe enforcement layer" pre-cutover build gap and
      redefined the Successor-Operator as a trained CC operator. v9 (2026-06-07) adds the Safety
      Portal field-PM account-administration runbook to Step 8 (operator provision/reset/disable/
      enable/list via the safety_reports.portal_admin CLI; server-side session revocation; a
      one-time live-activation gate: byte-equal admin tokens + migration 0006-before-redeploy +
      redeploy). Portal-user admin is Tier-2 low-class; rotating the admin token is Tier-3
      secrets/auth. The three-tier model, roles, and escalation boundary carry forward from v8.
      Citations in ~/its should read "Handover Plan v9".
    drift_signal: 'Handover Plan v[1-8]\b in current-doctrine prose'

# --- §42 module-docstring discipline (Op Stds v13) -----------------------------
section_42:
  source: "../its-blueprint/doctrine/operational-standards.md §42"
  required_headings:        # exact, in this order, RST-underline style
    - Purpose
    - Invariants
    - Failure modes
    - Consumers
  applies_to:
    - "new shared/*.py modules (from the v13 bump forward)"
    - "workstream entrypoints (e.g. safety_reports/intake_poll.py, weekly_generate.py)"
  retrofit_policy: "existing modules: opportunistic per §14 (retrofit-when-touched), NOT a sweep PR"
  inventory: "docs/reports/2026-05-28_section42_compliance_inventory.md"

# --- §43 successor-remediation runbook discipline (Op Stds v15, carried in v16) -
# Recorded here so the manifest reflects the discipline introduced in the de-1b
# cascade. The mechanical checker does NOT yet consume this block (no §43 check
# exists) — it is documentation-only / future-proofing, mirroring how section_42
# predated any automated heading enforcement.
section_43:
  source: "../its-blueprint/doctrine/operational-standards.md §43"
  title: "Successor-Remediation Documentation Discipline"
  summary: >
    Plain-language "document-as-you-build" companion to §42. Where §42 answers
    "why is this code the way it is" (developer audience), §43 answers "what does
    the Successor-Operator do when this capability misbehaves" (trained-operator
    audience). Each capability with a Tier-2-reachable failure mode ships a §43
    remediation entry as part of definition-of-done: the symptom, the low-class
    repair steps, and the explicit escalate-to-Seth (Tier-3) boundary stated in
    observable terms.
  applies_to:
    - "every new workstream capability whose failure a Successor-Operator could plausibly be asked to resolve at Tier 2"
  enforcement: "convention + PR review (mirrors §42); NOT a structural enforcement layer (Op Stds v16 §44 is training-bounded)"
  introduced: "Op Stds v15; carried forward unchanged in v16"

