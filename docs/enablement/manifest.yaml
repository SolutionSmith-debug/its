# ═══════════════════════════════════════════════════════════════════════════════════════
# §6a enablement manifest — THE build set for the docs → branded-PDF pipeline (WS3 / D2-1)
# ═══════════════════════════════════════════════════════════════════════════════════════
# This is the single source of truth for which in-repo enablement guides get rendered to
# delivery-critical branded PDF manuals (§6 / A8 documentation program). It closes the
# long-open "§6a enablement-doc DoD owed" tech-debt registration: a new capability guide is
# "registered" by adding an entry here.
#
# Consumers:
#   * scripts/build_docs_pdfs.py --all      → renders every entry to docs/_build_pdf/<key>.pdf
#   * scripts/build_docs_pdfs.py --check     → doc-currency: re-hashes each source, flags drift
#   * docs_pdf/manifest.py                    → the loader (shape-checked, typed error)
#
# Each entry:
#   key      stable slug — matches the source filename stem AND the output PDF stem
#   title    display title for the PDF masthead + footer provenance line
#   version  manual version string (bump when the guide is substantively revised)
#   source   repo-root-relative path to the markdown source
#   sha256   SHA-256 of the source file's raw bytes — the doc-currency baseline. When a
#            guide is edited AND re-rendered, re-record its sha here (recompute:
#            `python -c "import hashlib,pathlib;print(hashlib.sha256(pathlib.Path('<src>').read_bytes()).hexdigest())"`).
#
# D2-2 (authored 2026-07-10): the ITS Owner's Manual, the safety-forms + admin-dashboard
# guides, and the auto-generated ITS_Config data dictionary are now written and registered
# below (the D2-1 note that they were "not yet authored" is resolved). The dictionary source
# (docs/references/its_config_dictionary.md) is GENERATED by
# scripts/generate_config_dictionary.py — after a config change, regenerate it and re-record
# its sha256 here (`--check` in the generator flags the drift; the generator is deterministic).
# ═══════════════════════════════════════════════════════════════════════════════════════
