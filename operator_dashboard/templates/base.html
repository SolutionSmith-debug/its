<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ITS Operator Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <span class="brand-lockup">
      <span class="logo-plate">
        <img src="/static/evergreen-logo.svg" alt="Evergreen Renewables" class="brand-logo">
      </span>
      <span class="brand-wordmark">Integrated Technical System</span>
    </span>
    <span class="badge readonly">read-only · localhost</span>
    <nav class="topnav">
      <a href="/">status</a>
      <a href="/config">config editor</a>
    </nav>
    <span class="host">127.0.0.1:8484</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
