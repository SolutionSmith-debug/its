<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}ITS Operator Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <header class="topbar">
    <span class="crest" aria-hidden="true">E</span>
    <div class="wordmark">
      <span class="wm-line"><span class="wm-its">ITS</span><span class="wm-full"> · Integrated Technical System</span></span>
      <span class="brand-sub">Evergreen Renewables</span>
    </div>
    <span class="badge readonly">read-only · localhost</span>
    <nav class="topnav">
      <a href="/">status</a>
      <a href="/config">config editor</a>
    </nav>
    <span class="host">127.0.0.1:8484</span>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
